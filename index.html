<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - SSS Support Tools</title>
    <style>
        /* Matching the Calculator Theme */
        body { 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            padding: 20px; 
            background-color: #f4f7f6; 
        }
        .card { 
            background: white; 
            padding: 3rem 2rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 600px; 
            text-align: center; 
        }
        
        .logo-container { margin-bottom: 20px; }
        .sss-logo { height: 80px; width: auto; }
        
        h1 { 
            color: #0038a8; 
            margin-top: 10px; 
            font-size: 1.8rem; 
        }
        
        p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-link { 
            display: block;
            background-color: #0038a8; 
            color: white; 
            text-decoration: none;
            padding: 14px; 
            border-radius: 6px; 
            font-size: 16px; 
            font-weight: bold; 
            transition: background 0.3s, transform 0.2s; 
        }
        
        .btn-link:hover { 
            background-color: #002673; 
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: #6c757d;
        }

        .btn-secondary:hover {
            background-color: #5a6268;
        }

        .contact-info { 
            margin-top: 40px; 
            padding-top: 20px; 
            border-top: 1px solid #eee; 
            text-align: left; 
        }
        .contact-header { font-size: 1.05rem; font-weight: bold; color: #333; margin-bottom: 5px; }
        .contact-detail { font-size: 0.9rem; color: #666; margin-bottom: 3px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4f/Social_Security_System_%28SSS%29.svg" alt="SSS Logo" class="sss-logo">
    </div>

    <h1>Welcome to SSS Support Tools</h1>
    <p>
        Easily manage and calculate your contribution penalties or learn more about the Social Security System using the links below.
    </p>

    <div class="nav-links">
        <a href="contribution_calculator.html" class="btn-link">Go to Contribution Penalty Calculator</a>
        
        <a href="https://www.sss.gov.ph" target="_blank" rel="noopener noreferrer" class="btn-link btn-secondary">Learn About Us (Official Site)</a>
    </div>

    <div class="contact-info">
        <div class="contact-header">Contact Information</div>
        <div class="contact-detail">
            Terry Cruz<br>
            SSS Legarda Branch
        </div>
    </div>
</div>

</body>
</html>
